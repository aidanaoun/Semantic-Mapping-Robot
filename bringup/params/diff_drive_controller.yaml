controller_manager:
  ros__parameters:
    update_rate: 40  # Hz
    use_sim_time: true

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    type: diff_drive_controller/DiffDriveController
    left_wheel_names: ["chassis_to_leftWheel"]
    right_wheel_names: ["chassis_to_rightWheel"]

    wheel_separation: 0.44
    wheel_radius: 0.1

    publish_rate: 50.0
    use_sim_time: true
    use_stamped_vel: false
    base_frame_id: chassis

joint_state_broadcaster:
  ros__parameters:
    type: joint_state_broadcaster/JointStateBroadcaster
    publish_rate: 50.0
    use_sim_time: true